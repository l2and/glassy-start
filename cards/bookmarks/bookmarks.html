<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookmarks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/card-base.css" />
    <link rel="stylesheet" href="bookmarks.css" />
  </head>
  <body class="card-body--stretch">
    <script type="application/json" id="bookmarks-data">
      [
        { "label": "GitHub", "url": "https://github.com", "icon": "⌘" },
        { "label": "Linear", "url": "https://linear.app", "icon": "◆" },
        { "label": "Notion", "url": "https://www.notion.so", "icon": "N" },
        { "label": "Mail", "url": "https://mail.google.com", "icon": "✉" },
        { "label": "Calendar", "url": "https://calendar.google.com", "icon": "▦" },
        { "label": "LangChain", "url": "https://python.langchain.com", "icon": "⛓" }
      ]
    </script>
    <div class="card-frame bookmarks-card">
      <nav class="bookmark-grid" id="bookmark-grid" aria-label="Quick links"></nav>
    </div>
    <script src="bookmarks.js" defer></script>
  </body>
</html>
