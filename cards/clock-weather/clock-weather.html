<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Clock &amp; weather</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/card-base.css" />
    <link rel="stylesheet" href="clock-weather.css" />
  </head>
  <body class="card-body--center">
    <div class="card-frame clock-weather-panel" role="group" aria-label="Local time and weather">
      <div class="cw-avatar" aria-hidden="true">
        <div class="cw-avatar-ring">
          <div class="cw-avatar-crop">
            <img
              id="weather-icon"
              class="cw-avatar-img"
              alt=""
              width="150"
              height="150"
              decoding="async"
            />
            <span id="weather-icon-fallback" class="cw-avatar-fallback" hidden></span>
          </div>
        </div>
      </div>

      <time id="clock-time" class="cw-title" datetime=""></time>

      <div class="cw-action" role="status">
        <svg
          class="cw-action-icon"
          width="18"
          height="18"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M14 14.76V3.5a2.5 2.5 0 0 0-5 0v11.26a4.5 4.5 0 1 0 5 0z" />
        </svg>
        <span class="cw-action-text">
          <span id="weather-temp" class="cw-action-temp">--°F</span>
          <span class="cw-action-sep" aria-hidden="true">|</span>
          <span id="weather-word" class="cw-action-desc">--</span>
        </span>
      </div>

      <p id="weather-location" class="cw-location" aria-label="Forecast location"></p>

      <p class="cw-body">
        <span id="clock-date" class="cw-date"></span>
      </p>
    </div>
    <script src="../../js/cards.config.js"></script>
    <script src="clock-weather.js" defer></script>
  </body>
</html>
